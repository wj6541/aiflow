<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aiflow UI Example</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AI delivery workflow</p>
        <h1>aiflow UI evidence example</h1>
        <p class="summary">
          A tiny page used to verify screenshots, console errors, and responsive checks.
        </p>
        <div class="actions">
          <button type="button">Primary action</button>
          <a href="#details">View details</a>
        </div>
      </section>
      <section id="details" class="panel">
        <h2>Validation targets</h2>
        <ul>
          <li>Desktop, tablet, and mobile screenshots</li>
          <li>No console errors</li>
          <li>No horizontal overflow</li>
        </ul>
      </section>
    </main>
  </body>
</html>
